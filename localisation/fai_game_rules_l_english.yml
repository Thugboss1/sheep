l_english:
 
 BM_RULE_GROUP_PRODUCTION_FIX_AI:0 "BM Frontline AI : Production Fix (AI)"
 BM_RULE_AI_PRODUCTION_FIX:0 "Frontline AI : Production Fix"


 BM_RULE_AI_PRODUCTION_FIX_ALLOWED_DESC:0 "§YAI production fix§! §Renabled§! \nDue to the fact that the AI is constantly deleting its production lines, it loses a significant part of its potential equipment, which is not lost by the player. This rule corrects this problem by adding for the AI §Ybase production efficiency§!:\n  §G20%§! for §GRecruit§! difficulty,\n  §G40%§! for §YRegular§! difficulty,\n  §G60%§! for §RVeteran§! difficulty,\n  §G80%§! for §RElite§! difficulty.\n§YMax production efficiency§! will also be increased on:\n §G20%§! for §RVeteran§! difficulty\n §G40%§! for §RElite§! difficulty\n§YBase production efficiency§! will always be on §G10%§! lower then §Ymax production efficiency§! depending from researched technologies\n\n§YThis makes your struggle with the AI much harder. It is recommended to disable it when playing minor countries or for inexperienced players§!"
 BM_RULE_AI_PRODUCTION_FIX_BLOCKED_DESC:0 "§YAI fixes§! §Gdisabled§! \n§GRecommended for new players and games for minor countries§!\n\n"
 BM_RULE_AI_TRAINING_FIX_ENABLE_ALLOWED_DESC:0 "§YAI training troops fixes§! §Renabled§! \nDue to the presence of only two scenarios of behavior for AI - war and peace, AI is not able to deploy divisions during the war with §Yfull equipment§!. This leads to the fact that §Ydivisions without equipment are deployed§!, which fight much worse in battle. This rule fixes this problem by increasing the §Rminimum training level to 70%§! for AI, and decreasing the §Yarmy training speed to -33%§! to match the player's capabilities. \n\n§YThis makes your struggle with the AI harder. It is recommended to disable it when playing minor countries or for inexperienced players§!"
 BM_RULE_AI_TRAINING_AND_PRODUCTION_FIX_ALLOWED_DESC:0 "§YAI production and training troops fixes§! §Renabled§! \nA combination of the two previous rules that will make your game more like a confrontation with a real player.\n\n§YThis makes your struggle with the AI much harder. It is recommended to disable it when playing minor countries or for inexperienced players§!"
 BM_RULE_AI_PRODUCTION_FIX_OPTION_ALLOWED:0 "Production fix enabled"
 BM_RULE_AI_TRAINING_FIX_OPTION_ALLOWED:0 "Training Troops fix enabled"
 BM_RULE_AI_TRAINING_AND_PRODUCTION_OPTION_ALLOWED:0 "Production and Training fixes enabled"